<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP</title>
    <meta property="og:title" content="SIP" />
    <meta property="og:description" content="Platform monitoring siswa SMK — absensi, kasus, observasi, dan komunikasi sekolah dalam satu sistem." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SIP" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f4ff;
            color: #1e3a5f;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(26,86,219,.10);
            padding: 48px 32px;
            max-width: 360px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #dbeafe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg { width: 40px; height: 40px; stroke: #1a56db; fill: none; }
        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
        p  { font-size: 0.95rem; color: #5a7a99; line-height: 1.6; margin-bottom: 28px; }
        button {
            display: inline-block;
            padding: 12px 28px;
            background: #1a56db;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1648c0; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
        </svg>
    </div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Perangkat Anda sedang offline. Hubungkan ke internet untuk menggunakan <span data-brand="school-name">platform ini</span>.</p>
    <button onclick="window.location.reload()">Coba Lagi</button>
</div>
<script type="module">
    import { applyBranding } from './shared/branding.js';
    applyBranding();
</script>
<script src="./shared/wa-float.js"></script>
</body>
</html>
