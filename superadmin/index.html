<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin — SIP</title>
    <meta property="og:title" content="SIP" />
    <meta property="og:description" content="Platform monitoring siswa SMK — absensi, kasus, observasi, dan komunikasi sekolah dalam satu sistem." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SIP" />
<script>(function(){var last=location.pathname.split("/").filter(Boolean).pop();if(["admin","guru","student","parent","dudi","stakeholder","superadmin"].indexOf(last)>-1){var b=document.createElement("base");b.href=location.pathname.endsWith("/")?location.pathname:location.pathname+"/";document.head.appendChild(b);}})();</script>
    <link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
    <link rel="icon" href="../favicon.ico" sizes="any">
    <link rel="stylesheet" href="css/superadmin.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <h1>⚙️ Platform Sekolah</h1>
            <p>Panel Superadmin — Khusus Vendor</p>
        </div>
        <div class="login-error" id="login-error"></div>
        <form id="login-form">
            <div class="field">
                <label for="sa-key">Superadmin Key</label>
                <input type="password" id="sa-key" class="input" placeholder="Masukkan superadmin key" required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">Masuk</button>
        </form>
    </div>
</div>
<script type="module" src="js/auth.js"></script>
</body>
</html>
