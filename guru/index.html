<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Guru — SMK Harapan Rokan</title>
<script>(function(){var last=location.pathname.split("/").filter(Boolean).pop();if(["admin","guru","student","parent","dudi","stakeholder","superadmin"].indexOf(last)>-1){var b=document.createElement("base");b.href=location.pathname+"/";document.head.appendChild(b);}})();</script>
    <link rel="stylesheet" href="css/guru.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div data-brand="logo" style="display:none"></div>
            <h1>Portal Guru</h1>
            <p data-brand="school-name">SMK Harapan Rokan</p>
        </div>
        <div class="login-error" id="login-error"></div>
        <form id="login-form">
            <div class="field">
                <label for="identifier">NIP / NIK</label>
                <input type="text" id="identifier" class="input" placeholder="Masukkan NIP atau NIK" autocomplete="username" inputmode="numeric" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" class="input" placeholder="Password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">Masuk</button>
        </form>
    </div>
</div>
<script type="module" src="js/auth.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('../sw.js');
    });
  }
</script>
</body>
</html>
