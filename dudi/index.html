<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal DUDI — SIP</title>
    <meta property="og:title" content="SIP" />
    <meta property="og:description" content="Platform monitoring siswa SMK — absensi, kasus, observasi, dan komunikasi sekolah dalam satu sistem." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SIP" />
  <script src="js/sw-guard.js"></script>
<script>(function(){var last=location.pathname.split("/").filter(Boolean).pop();if(["admin","guru","student","parent","dudi","stakeholder","superadmin"].indexOf(last)>-1){var b=document.createElement("base");b.href=location.pathname.endsWith("/")?location.pathname:location.pathname+"/";document.head.appendChild(b);}})();</script>
    <link rel="stylesheet" href="css/dudi.css" />
  <link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="login-screen">
        <div class="login-card">
            <div class="brand">
                <div class="logo-dot" data-brand="logo">D</div>
                <h2>Portal DUDI</h2>
                <p data-brand="school-name" style="font-weight:600;font-size:13px;margin-bottom:2px"></p>
                <p>Masuk dengan nama usaha Anda</p>
            </div>

            <div id="login-error" class="alert alert-danger" style="display:none"></div>

            <form id="login-form">
                <div class="field">
                    <label for="login-identifier">Nama Usaha (ID Login)</label>
                    <input id="login-identifier" class="input" type="text"
                           autocomplete="username" placeholder="contoh: cv-maju-bersama" required />
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input id="login-password" class="input" type="password"
                           autocomplete="current-password" required />
                </div>
                <button id="login-submit" type="submit" class="btn btn-primary" style="width:100%">Masuk</button>
            </form>

            <p class="hint" style="text-align:center;margin-top:16px">
                Belum punya akun? Hubungi sekolah untuk pendaftaran.
            </p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
<script>
  /* SW DINONAKTIFKAN SEMENTARA u2014 lihat commit 8745e4c (fix v8 stuck cache).
     Uncomment blok di bawah untuk reaktivasi service worker.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('../sw.js', { updateViaCache: 'none' });
    });
  }
  */
</script>
</body>
</html>
