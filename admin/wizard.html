<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Setup Wizard — Student Insight Platform</title>
    <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
    <div class="wz-shell">

        <!-- Header: brand + nama langkah aktif -->
        <header class="wz-header">
            <span class="wz-brand">Student Insight Platform</span>
            <span class="wz-active-name" id="wizard-active-step-name">Profil Sekolah</span>
        </header>

        <!-- Progress horizontal — hanya tampil di mobile -->
        <div class="wz-progress-mobile" id="wizard-progress-mobile" aria-hidden="true">
            <span class="wz-bar" data-step="1"></span>
            <span class="wz-bar" data-step="2"></span>
            <span class="wz-bar" data-step="3"></span>
            <span class="wz-bar" data-step="4"></span>
            <span class="wz-bar" data-step="5"></span>
            <span class="wz-bar" data-step="6"></span>
            <span class="wz-bar" data-step="7"></span>
            <span class="wz-bar" data-step="8"></span>
            <span class="wz-bar" data-step="9"></span>
        </div>

        <div class="wz-body">

            <!-- Sidebar progress vertikal (desktop) -->
            <aside class="wz-sidebar">
                <ol class="wz-steps" id="wizard-steps">
                    <li class="wz-step-item" data-step="1"><span class="wz-marker">1</span><span>Profil Sekolah</span></li>
                    <li class="wz-step-item" data-step="2"><span class="wz-marker">2</span><span>Tahun Ajaran</span></li>
                    <li class="wz-step-item" data-step="3"><span class="wz-marker">3</span><span>Program Keahlian</span></li>
                    <li class="wz-step-item" data-step="4"><span class="wz-marker">4</span><span>Kelas &amp; Rombel</span></li>
                    <li class="wz-step-item" data-step="5"><span class="wz-marker">5</span><span>Guru</span></li>
                    <li class="wz-step-item" data-step="6"><span class="wz-marker">6</span><span>Siswa</span></li>
                    <li class="wz-step-item" data-step="7"><span class="wz-marker">7</span><span>Wali Kelas</span></li>
                    <li class="wz-step-item" data-step="8"><span class="wz-marker">8</span><span>Jadwal</span></li>
                    <li class="wz-step-item" data-step="9"><span class="wz-marker">9</span><span>Selesai</span></li>
                </ol>
            </aside>

            <!-- Area konten: setiap langkah dirender oleh wizard.js -->
            <main class="wz-content">
                <div class="alert alert-danger" id="wizard-error" style="display:none"></div>
                <div class="wz-panel" id="wizard-step-content">
                    <!-- wizard.js merender isi langkah aktif di sini -->
                </div>
            </main>

        </div>

        <!-- Footer: navigasi -->
        <footer class="wz-footer">
            <button type="button" class="btn btn-secondary" id="wizard-prev-btn">Sebelumnya</button>
            <button type="button" class="btn btn-primary" id="wizard-next-btn">Selanjutnya</button>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="js/wizard.js"></script>

    <div id="password-modal" style="
        position:fixed;inset:0;background:rgba(0,0,0,0.6);
        display:none;align-items:center;justify-content:center;
        z-index:1000;">
        <div style="background:#fff;border-radius:8px;padding:2rem;width:100%;max-width:400px;margin:1rem;">
            <h2 style="margin:0 0 0.5rem">Ganti Password</h2>
            <p style="margin:0 0 1.5rem;color:#555;font-size:0.9rem">
                Anda menggunakan password default. Wajib diganti sebelum melanjutkan.
            </p>
            <div id="password-modal-error" style="display:none;color:#c00;margin-bottom:1rem;font-size:0.9rem"></div>
            <label style="display:block;margin-bottom:0.25rem;font-size:0.9rem">Password Baru</label>
            <input id="modal-new-password" type="password" autocomplete="new-password"
                style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;margin-bottom:1rem;box-sizing:border-box">
            <label style="display:block;margin-bottom:0.25rem;font-size:0.9rem">Konfirmasi Password</label>
            <input id="modal-confirm-password" type="password" autocomplete="new-password"
                style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;margin-bottom:1.5rem;box-sizing:border-box">
            <button id="modal-submit-btn" style="
                width:100%;padding:0.75rem;background:#1a56db;color:#fff;
                border:none;border-radius:4px;cursor:pointer;font-size:1rem">
                Simpan Password
            </button>
        </div>
    </div>
</body>
</html>
