<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk — Portal Orang Tua</title>
    <link rel="stylesheet" href="css/parent.css" />
  <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="login-screen">
        <div class="login-card">
            <div class="brand">
                <div class="logo-dot">O</div>
                <h2>Portal Orang Tua</h2>
                <p>Masuk dengan NIK Anda</p>
            </div>

            <div id="login-error" class="alert alert-danger" style="display:none"></div>

            <form id="login-form">
                <div class="field">
                    <label for="login-identifier">NIK</label>
                    <input id="login-identifier" class="input" type="text" autocomplete="username" required />
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input id="login-password" class="input" type="password" autocomplete="current-password" required />
                </div>
                <button id="login-submit" type="submit" class="btn btn-primary" style="width:100%">Masuk</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('../sw.js');
    });
  }
</script>
</body>
</html>
